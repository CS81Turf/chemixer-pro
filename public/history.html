<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>CheMixer Pro - History</title>
    <link rel="stylesheet" href="css/styles.css" />
  </head>
  <body>
    <header class="app-header">
      <div class="logo-container">
        <img src="/images/logo2.png" alt="CheMixer Pro Logo" class="logo" />
      </div>
      <nav class="main-nav">
        <ul>
          <li><a href="index.html">HOME</a></li>
          <li><a href="labels.html">LABELS</a></li>
          <li><a href="history.html">HISTORY</a></li>
          <li><a href="about.html">ABOUT</a></li>
        </ul>
      </nav>
    </header>
    
    <button class="logoutBtn" id="logoutBtn">Logout</button>

    <div id="logoutModal" class="logoutModal hidden">
        <div class="modal-content">
            <p>You have successfully logged out.</p>
            <button id="logoutOkBtn">OK</button>
        </div>
    </div>

    <main class="special">
        <h2>Mix History</h2>
        <div class="past-mix-table" id="past-mix-table"></div>

        <h2>Fertilizer Usage History</h2>

        <!-- Fertilizer Calendar -->
        <div class="fert-calendar-wrapper">
            <div class="calendar-header">
                <button class="cal-nav-btn" id="calPrevBtn">&#8592;</button>
                <span class="cal-month-label" id="calMonthLabel"></span>
                <button class="cal-nav-btn" id="calNextBtn">&#8594;</button>
            </div>
            <div class="calendar-grid" id="fertCalendar"></div>
        </div>

        <div class="past-mix-table" id="fert-usage-table"></div>

        <!-- Day Detail Modal -->
        <div id="fertDayModal" class="modal hidden">
            <div class="modal-content fert-day-modal-content">
                <h3 id="fertDayModalTitle"></h3>
                <div id="fertDayModalBody"></div>
                <button id="fertDayModalClose">Close</button>
            </div>
        </div>
    </main>

    <script src="js/history.js"></script>
    <script src="js/auth.js"></script>
  </body>
</html>
